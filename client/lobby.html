<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIF3 — Лобби</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f23;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: #e0e0e0;
    }
    .lobby-container {
      max-width: 900px;
      margin: 40px auto;
      padding: 30px;
      background: #1a1a2e;
      border-radius: 12px;
    }
    .lobby-title {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      color: #00d4ff;
    }
    .lobby-subtitle {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }
    .join-section {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      align-items: flex-end;
    }
    .form-group { flex: 1; }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #aaa;
    }
    .form-group select, .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 14px;
    }
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-primary { background: #0066cc; color: #fff; }
    .btn-primary:hover { background: #0077ee; }
    .btn-success { background: #28a745; color: #fff; }
    .btn-success:hover { background: #34c759; }
    .btn-warning { background: #e6a817; color: #1a1a2e; }
    .btn-warning:hover { background: #ffc107; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .players-section { margin-bottom: 30px; }
    .players-section h3 { margin-bottom: 12px; color: #00d4ff; }
    .player-list { list-style: none; padding: 0; }
    .player-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; background: #16213e;
      border-radius: 6px; margin-bottom: 6px;
    }
    .player-role {
      font-size: 11px; padding: 3px 8px;
      border-radius: 4px; font-weight: bold;
    }
    .role-charterer { background: #2196f3; color: #fff; }
    .role-shipowner { background: #ff9800; color: #fff; }
    .player-ready { color: #4caf50; font-weight: bold; }
    .player-not-ready { color: #888; }
    .player-host { color: #ffd700; font-size: 12px; }

    .config-section {
      background: #16213e; padding: 20px;
      border-radius: 8px; margin-bottom: 20px;
    }
    .config-section h3 { margin-top: 0; color: #00d4ff; }
    .config-row { display: flex; gap: 20px; margin-bottom: 12px; }
    .config-row .form-group { flex: 1; }

    .actions { display: flex; gap: 12px; justify-content: center; }
    .error-msg { color: #ff4444; text-align: center; margin: 10px 0; }
    .joined-info { text-align: center; color: #4caf50; font-size: 16px; margin: 10px 0; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="lobby-container">
    <h1 class="lobby-title">DIF3 — Морская торговая симуляция</h1>
    <p class="lobby-subtitle" id="lobby-subtitle">Деловая имитационная финансовая игра</p>

    <!-- Join form -->
    <div id="join-form">
      <div class="join-section">
        <div class="form-group">
          <label>Роль</label>
          <select id="role-select">
            <option value="charterer">Фрахтователь</option>
            <option value="shipOwner">Судовладелец</option>
          </select>
        </div>
        <div class="form-group">
          <label>Компания</label>
          <select id="company-select">
            <!-- Фрахтователи (по умолчанию) -->
            <option value="1">Стокгруп</option>
            <option value="2">Мастер Трейд</option>
            <option value="3">Карго Экспресс</option>
            <option value="4">Глобал Фрейт</option>
            <option value="5">СиТрейд</option>
            <option value="6">Океан Коммерс</option>
            <option value="7">Порт Трейдинг</option>
            <option value="8">Маритайм Мерчанс</option>
          </select>
        </div>
        <button class="btn btn-primary" id="join-btn">Войти</button>
      </div>
      <div id="join-error" class="error-msg"></div>
    </div>

    <!-- After joining -->
    <div id="joined-info" class="joined-info hidden"></div>

    <!-- Player list -->
    <div class="players-section">
      <h3>Игроки</h3>
      <ul class="player-list" id="player-list"></ul>
    </div>

    <!-- Host config -->
    <div id="config-section" class="config-section hidden">
      <h3>Настройки игры (только хост)</h3>
      <div class="config-row">
        <div class="form-group">
          <label>Скорость (игровых минут в секунду)</label>
          <input type="number" id="config-speed" value="30" min="1" max="600" step="1">
        </div>
        <div class="form-group">
          <label>Стартовый баланс ($)</label>
          <input type="number" id="config-balance" value="5000000" min="100000" step="100000">
        </div>
      </div>
      <div class="config-row">
        <div class="form-group">
          <label>Цена топлива ($/тонна)</label>
          <input type="number" id="config-fuel" value="500" min="1" step="10">
        </div>
        <div class="form-group">
          <label>Частота новостей (игровых часов)</label>
          <input type="number" id="config-news-freq" value="2" min="0.5" max="48" step="0.5">
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-warning hidden" id="ready-btn" disabled>Готов</button>
      <button class="btn btn-success hidden" id="start-btn" disabled>Начать игру</button>
    </div>
    <div id="action-error" class="error-msg"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // === Данные компаний (не зависят от внешних скриптов) ===
    var COMPANIES = {
      charterer: [
        { id: 1,  name: 'Стокгруп' },
        { id: 2,  name: 'Мастер Трейд' },
        { id: 3,  name: 'Карго Экспресс' },
        { id: 4,  name: 'Глобал Фрейт' },
        { id: 5,  name: 'СиТрейд' },
        { id: 6,  name: 'Океан Коммерс' },
        { id: 7,  name: 'Порт Трейдинг' },
        { id: 8,  name: 'Маритайм Мерчанс' },
      ],
      shipOwner: [
        { id: 101, name: 'Ривер Флот' },
        { id: 102, name: 'Мортранс' },
        { id: 103, name: 'Шиппинг Ко.' },
        { id: 104, name: 'Нэйви Лайнс' },
        { id: 105, name: 'Волга Шиппинг' },
        { id: 106, name: 'Балтик Кэрриерс' },
        { id: 107, name: 'Нозерн Флит' },
        { id: 108, name: 'Истерн Шиппинг' },
      ]
    };

    // === Заполнение дропдауна (работает даже без socket.io) ===
    var roleSelect = document.getElementById('role-select');
    var companySelect = document.getElementById('company-select');

    function updateCompanyList() {
      var role = roleSelect.value;
      var list = COMPANIES[role] || COMPANIES.charterer;
      companySelect.innerHTML = '';
      for (var i = 0; i < list.length; i++) {
        var opt = document.createElement('option');
        opt.value = list[i].id;
        opt.textContent = list[i].name;
        companySelect.appendChild(opt);
      }
    }
    roleSelect.onchange = updateCompanyList;
    updateCompanyList();

    // === Socket.IO (отдельно, чтобы ошибка не сломала дропдаун) ===
    var socket = null;
    var myId = null;
    var isHost = false;
    var hasJoined = false;

    try {
      socket = io();
    } catch(e) {
      console.error('Socket.IO не загружен:', e);
    }

    // Join
    document.getElementById('join-btn').onclick = function() {
      if (!socket) {
        document.getElementById('join-error').textContent = 'Нет соединения с сервером';
        return;
      }
      var role = roleSelect.value;
      var companyId = parseInt(companySelect.value);
      socket.emit('lobby:join', { companyId: companyId, role: role }, function(res) {
        if (res.error) {
          document.getElementById('join-error').textContent = res.error;
        } else if (res.lateJoin) {
          // Подключение к идущей игре — сразу перейти
          sessionStorage.setItem('dif3_companyId', String(companyId));
          window.location.href = '/index.html';
        } else {
          hasJoined = true;
          isHost = res.isHost;
          document.getElementById('join-form').classList.add('hidden');
          document.getElementById('joined-info').classList.remove('hidden');
          document.getElementById('joined-info').textContent =
            'Вы вошли как ' + (role === 'charterer' ? 'Фрахтователь' : 'Судовладелец');
          document.getElementById('ready-btn').disabled = false;
          document.getElementById('ready-btn').classList.remove('hidden');
          document.getElementById('join-error').textContent = '';
        }
      });
    };

    // Ready
    document.getElementById('ready-btn').onclick = function() {
      if (!socket) return;
      socket.emit('lobby:ready', null, function(res) {
        if (res) {
          document.getElementById('ready-btn').textContent = res.ready ? 'Не готов' : 'Готов';
        }
      });
    };

    // Start
    document.getElementById('start-btn').onclick = function() {
      if (!socket) return;
      var config = {
        timeSpeed: (parseFloat(document.getElementById('config-speed').value) || 30) / 60,
        startBalance: parseInt(document.getElementById('config-balance').value) || 5000000,
        fuelPricePerTon: parseInt(document.getElementById('config-fuel').value) || 500,
        newsFrequencyHours: parseFloat(document.getElementById('config-news-freq').value) || 2,
      };
      socket.emit('lobby:configure', config, function() {
        socket.emit('lobby:start', null, function(res) {
          if (res && res.error) {
            document.getElementById('action-error').textContent = res.error;
          }
        });
      });
    };

    // State updates
    if (socket) {
      // Запросить состояние лобби при подключении
      socket.on('connect', function() {
        socket.emit('lobby:getState', null, function(state) {
          if (state && state.started) {
            // Игра уже идёт — показать особый режим
            document.getElementById('lobby-subtitle').textContent = 'Игра уже идёт — выберите компанию для подключения';
            document.getElementById('lobby-subtitle').style.color = '#4caf50';
            document.getElementById('join-btn').textContent = 'Подключиться к игре';
            document.getElementById('join-btn').classList.remove('btn-primary');
            document.getElementById('join-btn').classList.add('btn-success');
          }
        });
      });

      socket.on('lobby:state', function(state) {
        myId = state.myId;
        isHost = state.isHost;

        var playerList = document.getElementById('player-list');
        var players = Object.values(state.players);
        playerList.innerHTML = players.map(function(p) {
          var roleClass = p.role === 'charterer' ? 'role-charterer' : 'role-shipowner';
          var roleName = p.role === 'charterer' ? 'Фрахтователь' : 'Судовладелец';
          var readyClass = p.ready ? 'player-ready' : 'player-not-ready';
          var readyText = p.ready ? 'Готов' : 'Не готов';
          var hostBadge = p.id === state.hostId ? '<span class="player-host">[Хост]</span>' : '';
          return '<li class="player-item">' +
            '<span class="player-role ' + roleClass + '">' + roleName + '</span>' +
            '<span>' + p.companyName + '</span>' +
            hostBadge +
            '<span class="' + readyClass + '" style="margin-left:auto">' + readyText + '</span>' +
            '</li>';
        }).join('');

        if (isHost && hasJoined) {
          document.getElementById('config-section').classList.remove('hidden');
          document.getElementById('start-btn').disabled = false;
          document.getElementById('start-btn').classList.remove('hidden');
        } else {
          document.getElementById('start-btn').classList.add('hidden');
        }
      });

      socket.on('lobby:gameStarted', function() {
        // Сохранить companyId для переподключения на новой странице
        var companyId = parseInt(companySelect.value);
        sessionStorage.setItem('dif3_companyId', String(companyId));
        window.location.href = '/index.html';
      });
    }
  </script>
</body>
</html>
